<svg viewBox="0 0 800 1150" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <rect width="800" height="1150" fill="#fafafa"/>

  <text x="400" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#1f2937">PRISMA 2020 Flow Diagram</text>
  <text x="400" y="52" text-anchor="middle" font-size="12" fill="#4b5563">Probiotic / Prebiotic / Synbiotic / FMT Interventions for Autism Spectrum Disorder</text>

  <!-- IDENTIFICATION label -->
  <rect x="30" y="72" width="140" height="24" rx="4" fill="#dbeafe"/>
  <text x="100" y="88" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e40af">IDENTIFICATION</text>

  <!-- Identification boxes -->
  <rect x="30" y="106" width="340" height="70" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="200" y="128" text-anchor="middle" font-size="12" font-weight="bold" fill="#1f2937">Records identified from databases</text>
  <text x="200" y="144" text-anchor="middle" font-size="10" fill="#4b5563">PubMed, Embase, Cochrane, PsycINFO, Web of Science</text>
  <text x="200" y="164" text-anchor="middle" font-size="16" font-weight="bold" fill="#1e3a8a">n = 847</text>

  <rect x="430" y="106" width="340" height="70" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="600" y="128" text-anchor="middle" font-size="12" font-weight="bold" fill="#1f2937">Records identified from other sources</text>
  <text x="600" y="144" text-anchor="middle" font-size="10" fill="#4b5563">Citation searching, reference lists</text>
  <text x="600" y="164" text-anchor="middle" font-size="16" font-weight="bold" fill="#1e3a8a">n = 23</text>

  <line x1="400" y1="176" x2="400" y2="196" stroke="#9ca3af" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- SCREENING label -->
  <rect x="30" y="204" width="120" height="24" rx="4" fill="#fef9c3"/>
  <text x="90" y="220" text-anchor="middle" font-size="11" font-weight="bold" fill="#854d0e">SCREENING</text>

  <!-- After duplicates removed -->
  <rect x="30" y="238" width="340" height="56" rx="6" fill="#ffffff" stroke="#374151" stroke-width="2"/>
  <text x="200" y="260" text-anchor="middle" font-size="12" font-weight="bold" fill="#1f2937">Records after duplicates removed</text>
  <text x="200" y="280" text-anchor="middle" font-size="16" font-weight="bold" fill="#1f2937">n = 612</text>

  <rect x="430" y="238" width="340" height="56" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="600" y="260" text-anchor="middle" font-size="12" font-weight="bold" fill="#1f2937">Duplicates removed</text>
  <text x="600" y="280" text-anchor="middle" font-size="16" font-weight="bold" fill="#991b1b">n = 258</text>

  <line x1="200" y1="294" x2="200" y2="314" stroke="#9ca3af" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Title/abstract screening -->
  <rect x="30" y="322" width="340" height="56" rx="6" fill="#ffffff" stroke="#374151" stroke-width="2"/>
  <text x="200" y="344" text-anchor="middle" font-size="12" font-weight="bold" fill="#1f2937">Records screened (title/abstract)</text>
  <text x="200" y="364" text-anchor="middle" font-size="16" font-weight="bold" fill="#1f2937">n = 612</text>

  <rect x="430" y="322" width="340" height="56" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="600" y="340" text-anchor="middle" font-size="12" font-weight="bold" fill="#1f2937">Records excluded</text>
  <text x="600" y="355" text-anchor="middle" font-size="9.5" fill="#4b5563">Not RCT, not ASD, not probiotic/FMT, reviews, protocols</text>
  <text x="600" y="372" text-anchor="middle" font-size="16" font-weight="bold" fill="#991b1b">n = 541</text>

  <line x1="200" y1="378" x2="200" y2="398" stroke="#9ca3af" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Full text assessed -->
  <rect x="30" y="406" width="340" height="56" rx="6" fill="#ffffff" stroke="#374151" stroke-width="2"/>
  <text x="200" y="428" text-anchor="middle" font-size="12" font-weight="bold" fill="#1f2937">Full-text articles assessed for eligibility</text>
  <text x="200" y="448" text-anchor="middle" font-size="16" font-weight="bold" fill="#1f2937">n = 71</text>

  <rect x="430" y="406" width="340" height="150" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="600" y="426" text-anchor="middle" font-size="12" font-weight="bold" fill="#1f2937">Full-text articles excluded</text>
  <text x="600" y="443" text-anchor="middle" font-size="16" font-weight="bold" fill="#991b1b">n = 62</text>
  <text x="450" y="462" font-size="10" fill="#374151">• No behavioural outcomes: 18</text>
  <text x="450" y="478" font-size="10" fill="#374151">• Data not extractable: 14</text>
  <text x="450" y="494" font-size="10" fill="#374151">• Open-label / no control: 12</text>
  <text x="450" y="510" font-size="10" fill="#374151">• Crossover design: 8</text>
  <text x="450" y="526" font-size="10" fill="#374151">• Change scores only: 5</text>
  <text x="450" y="542" font-size="10" fill="#374151">• High attrition (&gt;50%): 3 &#160;&#160;•&#160;Duplicate data: 2</text>

  <line x1="200" y1="462" x2="200" y2="588" stroke="#9ca3af" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- INCLUDED label -->
  <rect x="30" y="596" width="100" height="24" rx="4" fill="#dcfce7"/>
  <text x="80" y="612" text-anchor="middle" font-size="11" font-weight="bold" fill="#166534">INCLUDED</text>

  <!-- Included box -->
  <rect x="230" y="630" width="340" height="80" rx="6" fill="#f0fdf4" stroke="#16a34a" stroke-width="2.5"/>
  <text x="400" y="654" text-anchor="middle" font-size="13" font-weight="bold" fill="#1f2937">Studies included in quantitative synthesis</text>
  <text x="400" y="670" text-anchor="middle" font-size="13" font-weight="bold" fill="#1f2937">(meta-analysis)</text>
  <text x="400" y="696" text-anchor="middle" font-size="20" font-weight="bold" fill="#15803d">k = 9  |  n = 663 participants</text>

  <line x1="400" y1="710" x2="400" y2="730" stroke="#9ca3af" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Study breakdown -->
  <rect x="120" y="738" width="150" height="54" rx="5" fill="#f0fdf4" stroke="#4ade80" stroke-width="1.5"/>
  <text x="195" y="760" text-anchor="middle" font-size="11" font-weight="bold" fill="#166534">Probiotic RCTs</text>
  <text x="195" y="778" text-anchor="middle" font-size="14" font-weight="bold" fill="#15803d">k = 6</text>

  <rect x="285" y="738" width="150" height="54" rx="5" fill="#eff6ff" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="360" y="760" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e40af">Prebiotic RCT</text>
  <text x="360" y="778" text-anchor="middle" font-size="14" font-weight="bold" fill="#2563eb">k = 1</text>

  <rect x="450" y="738" width="150" height="54" rx="5" fill="#faf5ff" stroke="#c084fc" stroke-width="1.5"/>
  <text x="525" y="760" text-anchor="middle" font-size="11" font-weight="bold" fill="#6b21a8">Synbiotic RCT</text>
  <text x="525" y="778" text-anchor="middle" font-size="14" font-weight="bold" fill="#7e22ce">k = 1</text>

  <rect x="285" y="802" width="150" height="54" rx="5" fill="#fff7ed" stroke="#fb923c" stroke-width="1.5"/>
  <text x="360" y="824" text-anchor="middle" font-size="11" font-weight="bold" fill="#9a3412">FMT RCT</text>
  <text x="360" y="842" text-anchor="middle" font-size="14" font-weight="bold" fill="#c2410c">k = 1</text>

  <text x="400" y="900" text-anchor="middle" font-size="10" fill="#6b7280">Flow diagram template based on the PRISMA 2020 statement</text>
  <text x="400" y="916" text-anchor="middle" font-size="10" fill="#6b7280">Page et al. (2021) BMJ 372:n71</text>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#9ca3af"/>
    </marker>
  </defs>
</svg>
